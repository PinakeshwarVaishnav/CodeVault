<!DOCTYPE html>
<html lang="en">

<head>
	<meta charset="UTF-8">
	<meta name="viewport" content="width=device-width, initial-scale=1.0">
	<title>AI/ML Roadmaps Hub</title>
	<style>
		body {
			background: #080B12;
			color: #E8EDF5;
			font-family: sans-serif;
			display: flex;
			justify-content: center;
			align-items: center;
			height: 100vh;
			margin: 0;
		}

		.hub {
			text-align: center;
			border: 1px solid rgba(255, 255, 255, 0.1);
			padding: 40px;
			border-radius: 8px;
			background: #0D1220;
		}

		h1 {
			color: #00FFB2;
			margin-bottom: 30px;
		}

		.links {
			display: flex;
			flex-direction: column;
			gap: 15px;
		}

		a {
			color: #7B61FF;
			text-decoration: none;
			font-size: 1.2rem;
			padding: 10px;
			border: 1px solid #7B61FF;
			border-radius: 4px;
			transition: 0.3s;
		}

		a:hover {
			background: #7B61FF;
			color: white;
		}
	</style>
</head>

<body>
	<div class="hub">
		<h1>AI/ML Roadmaps</h1>
		<div class="links">
			<a href="/aiml">Ultimate Engineer Roadmap</a>
			<a href="/aimlroadmap">Core Roadmap</a>
			<a href="/aimlmasteryroadmap">Mastery Roadmap</a>
			<a href="/aimlskillsroadmap">Skills Roadmap</a>
		</div>
	</div>
</body>

</html>
